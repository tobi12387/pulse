name: docs-sync

# Stellt sicher, dass die zentralen Hard-Rule-Marker in AGENTS.md vorhanden sind.
#
# Bewusst pragmatisch: kein Pixel-genauer Vergleich, sondern Marker-basiert.
# Erweitern: PATTERNS-Liste unten ergänzen.
#
# Hinweis: docs/codex-system-prompt.md ist seit 2026-04-29 nur noch ein
# dünner Pointer-Prompt + Doku, keine Hard-Rules-Quelle. Wird hier nicht
# mehr geprüft.

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'docs/decisions.md'
      - '.github/workflows/docs-sync.yml'
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'docs/decisions.md'
  workflow_dispatch:

jobs:
  check-rule-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify canonical rules appear in AGENTS.md
        run: |
          set -u
          FILES=(AGENTS.md)

          # Jeder Eintrag ist eine grep -E -i Pattern. Mindestens eines der
          # alternativen Phrasings muss in jeder der beiden Dateien vorkommen.
          PATTERNS=(
            "single source of truth|source of truth"
            "git add \\."
            "additive|additiv"
            "scripts/deploy\\.sh"
            "pulse_daily_metrics"
            "decisions\\.md"
            "codex/<topic>|codex/[a-z]"
            "no.*telegram|kein.*telegram|keine.*telegram"
            "no.*habit|kein.*habit"
          )

          fail=0
          for pat in "${PATTERNS[@]}"; do
            for f in "${FILES[@]}"; do
              if ! grep -E -i -q -- "$pat" "$f"; then
                echo "::error file=$f::missing canonical rule pattern: '$pat'"
                fail=1
              fi
            done
          done

          if [ $fail -ne 0 ]; then
            echo ""
            echo "Hard-Rule-Drift erkannt — eine oder mehrere kanonische Regeln fehlen."
            echo "AGENTS.md oder PATTERNS-Liste in dieser Workflow-Datei anpassen,"
            echo "falls die Regel bewusst entfernt wurde."
            exit 1
          fi

          echo "Alle kanonischen Regeln in beiden Hauptdokumenten gefunden."

      - name: Verify decisions.md is append-only-friendly
        run: |
          # Sanity: decisions.md soll mindestens den Header und ≥1 Eintrag haben.
          if ! grep -E -q "^# Pulse — Decision Log" docs/decisions.md; then
            echo "::error file=docs/decisions.md::Header fehlt"
            exit 1
          fi
          entries=$(grep -E -c "^## [0-9]{4}-[0-9]{2}-[0-9]{2}" docs/decisions.md || true)
          if [ "$entries" -lt 1 ]; then
            echo "::error file=docs/decisions.md::keine Decision-Einträge gefunden"
            exit 1
          fi
          echo "decisions.md OK ($entries Einträge)."
