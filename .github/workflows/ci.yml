name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            runtime:
              - '.github/workflows/ci.yml'
              - 'backend/**'
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'playwright.config.ts'
              - 'scripts/**'
              - 'shared/**'
              - 'tsconfig*.json'
            backend:
              - '.github/workflows/ci.yml'
              - 'backend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/**'
              - 'shared/**'
              - 'tsconfig*.json'
            frontend:
              - '.github/workflows/ci.yml'
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'playwright.config.ts'
              - 'shared/**'
              - 'tsconfig*.json'

  build:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check migrations
        run: npm run check:migrations

      - name: Script guard tests
        run: npm run test:scripts

      - name: Build
        run: npm run build

  backend_tests:
    name: backend-tests
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coaching_os_v2_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d coaching_os_v2_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/coaching_os_v2
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5433/coaching_os_v2_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-with-at-least-32-chars
      OPENROUTER_API_KEY: test-openrouter-key
      GARMIN_EMAIL: test@example.com
      GARMIN_PASSWORD: test-password
      GARMIN_SIDECAR_URL: http://localhost:8001
      APP_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Apply test database migrations
        run: npm run db:migrate -w backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/coaching_os_v2_test

      - name: Backend tests
        run: npm test

  browser_tests:
    name: browser-tests
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Install Playwright Chromium
        run: npm run test:e2e:install

      - name: Browser smoke tests
        if: github.event_name == 'pull_request'
        run: npm run test:e2e:smoke

      - name: Browser full tests
        if: github.event_name != 'pull_request'
        run: npm run test:e2e:full

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  build-and-test:
    needs: [changes, build, backend_tests, browser_tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required CI jobs
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "backend-tests: ${{ needs.backend_tests.result }}"
          echo "browser-tests: ${{ needs.browser_tests.result }}"

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            exit 1
          fi

          for result in "${{ needs.build.result }}" "${{ needs.backend_tests.result }}" "${{ needs.browser_tests.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              exit 1
            fi
          done
